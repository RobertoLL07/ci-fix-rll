name: PR Change Description

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  describe-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Build and post PR change summary
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const marker = "<!-- pr-change-description -->";

            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number
            });

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            );

            const additions = files.reduce((sum, f) => sum + (f.additions || 0), 0);
            const deletions = files.reduce((sum, f) => sum + (f.deletions || 0), 0);
            const changedFiles = files.length;

            const maxFilesToShow = 25;
            const fileLines = files
              .slice(0, maxFilesToShow)
              .map(f => `- \`${f.filename}\` (+${f.additions} / -${f.deletions})`);

            if (files.length > maxFilesToShow) {
              fileLines.push(`- ...and ${files.length - maxFilesToShow} more files`);
            }

            const body = [
              marker,
              "### PR Change Description",
              `**PR:** #${pull_number} - ${pr.data.title}`,
              "",
              "**Summary**",
              `- Files changed: **${changedFiles}**`,
              `- Additions: **${additions}**`,
              `- Deletions: **${deletions}**`,
              `- Commits: **${pr.data.commits}**`,
              "",
              "**Changed files**",
              ...fileLines
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pull_number,
              per_page: 100
            });

            const existing = comments.find(
              c => c.user.type === "Bot" && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body
              });
            }
